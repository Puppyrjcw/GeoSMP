<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoSMP Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.8)),
    url("earth.png");
  background-size:cover;
  background-position:center;
  color:white;
}

/* NAVBAR */

header nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 80px;
  background:#020617;
}

header nav h1{
  color:#22c55e;
}

header nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-weight:500;
  transition:0.3s;
}

header nav a:hover{
  color:#22c55e;
}

/* SHOP SECTION */

.shop{
  max-width:1200px;
  margin:auto;
  padding:120px 40px;
  text-align:center;
}

.shop h2{
  font-size:48px;
  margin-bottom:60px;
}

/* PRODUCT CARD */

.product-grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
}

.product{
  background:#1e293b;
  padding:40px;
  border-radius:12px;
  width:280px;
  transition:all 0.3s ease;
  box-shadow:0 0 20px #22c55e; /* permanent glow */
}

.product:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px #22c55e;
}

.product h3{
  font-size:28px;
  margin-bottom:10px;
}

/* PRICE */

.price{
  font-size:24px;
  color:#22c55e;
  margin-bottom:20px;
  font-weight:700;
}

/* FEATURES */

.product ul{
  list-style:none;
  margin-bottom:20px;
}

.product li{
  margin:6px 0;
  color:#cbd5e1;
  font-weight:400; /* not bold */
}

/* BUY BUTTON */

.buy-btn{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:black;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.buy-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 15px #22c55e;
}

/* POPUP MODAL */

.modal{
  display:none;
  position:fixed;
  z-index:999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:opacity .3s ease;
}

.modal.show{
  display:flex;
  opacity:1;
}

.modal-content{
  background:#020617;
  padding:40px;
  border-radius:12px;
  text-align:center;
  max-width:400px;
  width:90%;
  transform:scale(0.9);
  transition:all 0.3s ease;
}

.modal.show .modal-content{
  transform:scale(1);
}

/* FOOTER */

footer{
  text-align:center;
  padding:30px;
  background:#020617;
  color:#94a3b8;
  margin-top:80px;
}

/* MOBILE */

@media (max-width:768px){

  header nav{
    padding:20px 40px;
  }

  .shop h2{
    font-size:36px;
  }

}

</style>
</head>

<body>

<header>
<nav>
<h1>GeoSMP</h1>

<div>
<a href="index.html">Home</a>
<a href="index.html#features">Features</a>
<a href="index.html#reviews">Reviews</a>
<a href="index.html#join">Join</a>
<a href="shop.html">Shop</a>
</div>

</nav>
</header>

<section class="shop">

<h2>GeoSMP Store</h2>

<div class="product-grid">

<div class="product">
<h3>VIP Rank</h3>

<p class="price"><strong>$5 CAD</strong></p>

<ul>
<li>Custom Username Gradient</li>
<li>VIP Chat Prefix</li>
<li>Extra View Distance</li>
<li>Support the Server ❤️</li>
</ul>

<button class="buy-btn" id="vipButton">Buy VIP</button>

</div>

</div>

</section>

<footer>
© 2026 GeoSMP
</footer>

<!-- POPUP -->

<div id="vipModal" class="modal">
  <div class="modal-content">
    <h2>Store Unavailable</h2>
    <p>This feature is currently not available yet.</p>
  </div>
</div>

<script>

const vipButton = document.getElementById("vipButton");
const modal = document.getElementById("vipModal");

vipButton.addEventListener("click", () => {
  modal.style.display = "flex";
  setTimeout(()=> modal.classList.add("show"),10);
});

window.addEventListener("click", (event) => {
  if(event.target.classList.contains("modal")){
    modal.classList.remove("show");
    setTimeout(()=> modal.style.display="none",300);
  }
});

</script>

</body>
</html>
